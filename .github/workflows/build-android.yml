name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web assets and sync Capacitor
        run: npm run build:android

      - name: Read app version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Decode release keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/yamadori-release.keystore

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Build release APK and AAB
        if: ${{ secrets.ANDROID_KEYSTORE_PASSWORD != '' }}
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: yamadori-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: yamadori-debug-apk
          path: android/app/build/outputs/apk/debug/Yamadori-${{ steps.version.outputs.version }}-debug.apk
          if-no-files-found: error

      - name: Upload release APK artifact
        if: ${{ secrets.ANDROID_KEYSTORE_PASSWORD != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: yamadori-release-apk
          path: android/app/build/outputs/apk/release/Yamadori-${{ steps.version.outputs.version }}.apk
          if-no-files-found: error

      - name: Upload release AAB artifact
        if: ${{ secrets.ANDROID_KEYSTORE_PASSWORD != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: yamadori-release-aab
          path: android/app/build/outputs/bundle/release/Yamadori-${{ steps.version.outputs.version }}.aab
          if-no-files-found: error

      - name: Attach release bundles to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && secrets.ANDROID_KEYSTORE_PASSWORD != ''
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/release/Yamadori-${{ steps.version.outputs.version }}.apk
            android/app/build/outputs/bundle/release/Yamadori-${{ steps.version.outputs.version }}.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach debug APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && secrets.ANDROID_KEYSTORE_PASSWORD == ''
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/Yamadori-${{ steps.version.outputs.version }}-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
