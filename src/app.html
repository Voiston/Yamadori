<!doctype html>

<html lang="fr">

	<head>

		<meta charset="utf-8" />

		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

		<meta name="theme-color" content="#1a2e1a" />

		<script>

			(function () {

				try {

					var locale = localStorage.getItem('PARAGLIDE_LOCALE');

					if (locale) {

						document.documentElement.lang = locale;

					}

					var themeMeta = document.querySelector('meta[name="theme-color"]');

					if (localStorage.getItem('yamadori-outdoor-mode') === '1') {

						document.documentElement.dataset.outdoor = 'true';

						if (themeMeta) themeMeta.setAttribute('content', '#ffffff');

					} else if (localStorage.getItem('yamadori-dark-mode') === '1') {

						document.documentElement.dataset.dark = 'true';

						if (themeMeta) themeMeta.setAttribute('content', '#000000');

					}

				} catch (e) {}

			})();

		</script>

		<meta name="description" content="Repérage d'arbres en forêt — Yamadori Scouting" />

		%sveltekit.head%

	</head>

	<body data-sveltekit-preload-data="hover">

		<div style="display: contents">%sveltekit.body%</div>

	</body>

</html>
